# roles/kube_vip/tasks/main.yaml
---
- name: Ensure kube-vip manifest directory exists
  ansible.builtin.file:
    path: /etc/kubernetes/manifests
    state: directory
    mode: "0755"

- name: Pull kube-vip image
  ansible.builtin.command:
    cmd: ctr image pull ghcr.io/kube-vip/kube-vip:{{ kube_vip_version }}
  changed_when: true

- name: Create temp file for kube-vip manifest
  ansible.builtin.tempfile:
    state: file
    suffix: kube-vip.yaml
  register: kube_vip_tmp

- name: Generate kube-vip manifest into temp file
  ansible.builtin.shell: |
    set -euo pipefail
    ctr run --rm --net-host ghcr.io/kube-vip/kube-vip:{{ kube_vip_version }} vip /kube-vip manifest pod \
      --interface {{ kube_vip_interface }} \
      --address {{ kube_vip_address }} \
      --controlplane \
      --arp \
      --leaderElection \
      --enableLoadBalancer \
      --services \
      > {{ kube_vip_tmp.path }}
  args:
    executable: /bin/bash
  changed_when: false

- name: Install kube-vip manifest (only if changed)
  ansible.builtin.copy:
    src: "{{ kube_vip_tmp.path }}"
    dest: "{{ kube_vip_manifest_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: Remove temp kube-vip manifest
  ansible.builtin.file:
    path: "{{ kube_vip_tmp.path }}"
    state: absent
